<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Send Me Your Info 🌟</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
    }
    label {
      display: block;
      margin: 15px 0 8px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.25);
      color: white;
      font-size: 1em;
      box-sizing: border-box;
      transition: all 0.3s;
    }
    input:focus, textarea:focus {
      outline: none;
      background: rgba(255,255,255,0.4);
      box-shadow: 0 0 15px rgba(255,255,255,0.5);
    }
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    button {
      width: 100%;
      padding: 15px;
      margin-top: 25px;
      background: linear-gradient(90deg, #ff6b6b, #ff8e53);
      border: none;
      border-radius: 50px;
      color: white;
      font-size: 1.2em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(255,107,107,0.4);
    }
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255,107,107,0.6);
    }
    #status {
      text-align: center;
      margin-top: 20px;
      font-weight: bold;
      font-size: 1.1em;
      padding: 10px;
      border-radius: 10px;
    }
    .success { background: rgba(0,200,0,0.3); }
    .error   { background: rgba(200,0,0,0.3); }
  </style>
</head>
<body>

  <div class="container">
    <h1>Send Me Your Info 🌈</h1>

    <form id="myForm">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required placeholder="Your name here..." />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required placeholder="example@email.com" />

      <label for="message">Message:</label>
      <textarea id="message" name="message" required placeholder="Say something fun! 🚀"></textarea>

      <button type="submit">Send Now →</button>
    </form>

    <div id="status"></div>
  </div>

  <script>
    const form = document.getElementById('myForm');
    const statusDiv = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusDiv.textContent = 'Sending... ✨';
      statusDiv.className = '';

      const formData = new FormData(form);
      const data = {};
      formData.forEach((value, key) => { data[key] = value; });

      // Add extra browser/user info
      data.browser = navigator.userAgent;
      data.screen = `\( {window.screen.width}x \){window.screen.height}`;
      data.time = new Date().toLocaleString('en-KE', { timeZone: 'Africa/Nairobi' });
      data.page = window.location.href;

      const webhookUrl = https://discord.com/api/webhooks/1480277425320624240/Tgo0p54meBj5CT3E7WAz_pitrXBo5ku2myd_oTr880WhCWLFeFqhV3xPrVCB--4xXR9x; // ← Paste your full webhook URL here

      // Use CORS proxy
      const proxyUrl = 'https://corsproxy.io/?' + https://discord.com/api/webhooks/1480277425320624240/Tgo0p54meBj5CT3E7WAz_pitrXBo5ku2myd_oTr880WhCWLFeFqhV3xPrVCB--4xXR9x encodeURIComponent(webhookUrl);

      try {
        const response = await fetch(proxyUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: '**🌟 New Info Submission! 🌟**\n' +
                     `**Name:** ${data.name || '—'}\n` +
                     `**Email:** ${data.email || '—'}\n` +
                     `**Message:** ${data.message || '—'}\n\n` +
                     `**Browser:** ${data.browser}\n` +
                     `**Screen:** ${data.screen}\n` +
                     `**Time (EAT):** ${data.time}\n` +
                     `**From Page:** ${data.page}`
          })
        });

        if (response.ok || response.type === 'opaque') {  // 'opaque' can happen with some proxies/no-cors
          statusDiv.textContent = 'Sent successfully! 🎉 Thanks!';
          statusDiv.className = 'success';
          form.reset();
        } else {
          throw new Error('Server responded with error');
        }
      } catch (err) {
        console.error(err);
        statusDiv.textContent = 'Error sending 😕 Try again or check console.';
        statusDiv.className = 'error';
      }
    });
  </script>

</body>
</html>
